name: CI + Deploy to GitHub Pages

# Single-path deploy: main -> GitHub Pages, via the official Actions model.
# No gh-pages branch, no second workflow. `configure-pages` (enablement:true)
# sets the Pages source to "GitHub Actions" so the deploy runs straight from
# this workflow. If the token can't flip the source, set it once by hand:
# Settings -> Pages -> Build and deployment -> Source -> "GitHub Actions".
#
# The `check` job is the regression net: content lint, the balance/reach
# --check gate, and the golden-master oracle — all run against the EMITTED
# dist/ (what actually deploys), so what's tested === what ships. `deploy`
# needs it, so a breach BLOCKS the deploy. tsc build lands here (Phase 0.5):
# the deploy now uploads the built dist/, not the source tree.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref group: main pushes still serialize (latest deploy cancels an older
# in-flight one — safe now that this is the ONLY deployer), while PR check runs
# on other refs never cancel each other or a main deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pinned toolchain
        run: npm ci
      - name: Build dist/ (tsc emit + static copy)
        run: npm run build
      - name: Content lint
        run: node tools/lint-content.mjs
      - name: Balance & reach gate (against dist/)
        run: node tools/simulate.mjs --check
      - name: Golden-master regression (against dist/)
        run: node --test test/golden.test.mjs

  deploy:
    needs: check
    # Deploy only from main — PR/branch runs stop at the check gate.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pinned toolchain
        run: npm ci
      - name: Build dist/ (tsc emit + static copy)
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # Ship the built site, not the source tree.
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages' deploy queue sometimes stalls for minutes platform-side;
          # wait out slow patches instead of aborting at the 10-min default.
          timeout: 1200000
