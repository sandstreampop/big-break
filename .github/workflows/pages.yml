name: Deploy to GitHub Pages

# Single-path deploy: main -> GitHub Pages, via the official Actions model.
# No gh-pages branch, no second workflow. `configure-pages` (enablement:true)
# sets the Pages source to "GitHub Actions" so the deploy runs straight from
# this workflow. If the token can't flip the source, set it once by hand:
# Settings -> Pages -> Build and deployment -> Source -> "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; queue rather than cancel so a run is never
# killed mid-deploy (mid-deploy cancellation is what wedged the old setup).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
