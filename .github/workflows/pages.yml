name: Deploy to GitHub Pages

# Publishes the static site to the gh-pages branch. Creating gh-pages
# auto-enables GitHub Pages for the repo (the GITHUB_TOKEN cannot create a
# Pages site via the newer API, so the classic branch flow is used instead).

on:
  push:
    branches:
      - claude/big-break-v0-1-6bbjas
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,tools'
