name: CI + Deploy to GitHub Pages

# Single-path deploy: main -> GitHub Pages, via the official Actions model.
# No gh-pages branch, no second workflow. `configure-pages` (enablement:true)
# sets the Pages source to "GitHub Actions" so the deploy runs straight from
# this workflow. If the token can't flip the source, set it once by hand:
# Settings -> Pages -> Build and deployment -> Source -> "GitHub Actions".
#
# The `check` job is the regression net: content lint, the balance/reach
# --check gate, and the golden-master oracles — all run against the EMITTED
# dist/ (what actually deploys), so what's tested === what ships. `deploy`
# needs it, so a breach BLOCKS the deploy.
#
# The game AND the docs site ship from this one workflow, one artifact,
# straight from main: the build emits the music game at dist/ (site root) and
# the docs site at dist/docs/ (built from docs-site/, which keeps its own
# toolchain isolated from the engine's pinned tsc). Push to main → both go
# live. The docs build is also a gate in the check job, so docs drift blocks
# the deploy like any other regression.
#
# Artifact ownership: the `check` job PRODUCES the Pages artifact (after the
# gates pass, main only) and `deploy` only calls deploy-pages to publish it.
# Two reasons: (1) what deploys is byte-for-byte the artifact that passed the
# gates — not a second independent rebuild in the deploy job; (2) a transient
# Pages-backend deploy failure retries as a cheap deploy-ONLY rerun, with no
# rebuild and, crucially, no second `github-pages` artifact — deploy-pages@v4
# aborts when a run has two artifacts of that name (the exact trap a naive
# "rerun the deploy job" hits when the deploy job also uploads).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref group: main pushes still serialize (latest deploy cancels an older
# in-flight one — safe now that this is the ONLY deployer), while PR check runs
# on other refs never cancel each other or a main deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # cache ~/.npm keyed on package-lock.json — cold npm ci was uncached
      - name: Install pinned toolchain
        run: npm ci
      - name: Build dist/ (tsc emit + static copy)
        run: npm run build
      - name: Strict typecheck gate (engine core — Epic 1)
        # Full `strict` over the genre-neutral core (js/engine.ts + the boundary
        # types + config), as its own noEmit pass. The frozen build tsconfig
        # can't flip `strict` while the shell still carries implicit `any`, so
        # this enforces it here instead. Type annotations erase at emit, so this
        # can never move a golden; the `include` glob in tsconfig.strict.json is
        # the migration frontier — widen it as each module is brought to strict.
        run: npm run typecheck
      - name: Engine neutrality gate (Epic 3)
        # The genre-agnostic core (js/engine.ts) must name no pack stat/resource/
        # effect-verb/flag. The blocklist is DERIVED from every registered pack's
        # manifest + plugins, so a third genre is policed automatically. Runs
        # against the built registry in dist/.
        run: node tools/check-engine-neutrality.mjs
      - name: Content lint
        run: node tools/lint-content.mjs
      - name: Balance & reach gate (music, against dist/)
        run: node tools/simulate.mjs --check
      - name: Golden-master regression (music + probe, against dist/)
        # Scope to the golden/invariant oracles (DOM-free, no browser). Newer
        # Node test-runner globs otherwise also sweep in test/ui-smoke.mjs, which
        # needs a browser this job doesn't install; the UI smoke test is run
        # separately (npm run check / the android+ios harness jobs install browsers).
        run: node --test test/*.test.mjs
      - name: Cache Playwright browsers
        # The browser binaries were re-downloaded cold every run — the single
        # largest wall-clock item. Cache them keyed on the pinned Playwright
        # version; a miss just downloads as before.
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Chromium (the browser UI gates below)
        # The UI suites skip cleanly when no browser exists — which silently
        # waives the ONLY coverage for phone-layout regressions. Install the
        # browser so they actually gate the deploy. On a cache hit the binaries
        # are already present, so this only fetches missing system deps.
        run: npx playwright install --with-deps chromium
      - name: UI smoke gate (each game to its finale, headless Chromium)
        # REQUIRE_BROWSER=1 turns the suite's browserless skip into a hard
        # failure: with a browser installed above, "no browser found" here can
        # only mean the install broke — never silently waive the coverage.
        run: node test/ui-smoke.mjs
        env:
          REQUIRE_BROWSER: '1'
      - name: Screen-contract gate (ADR-0009, phone crowding)
        run: node test/ui-crowding.mjs
        env:
          REQUIRE_BROWSER: '1'
      - name: Mobile-matrix gate (every phone class × legacy engines × stale-CSS delivery)
        run: node test/ui-mobile-matrix.mjs
        env:
          REQUIRE_BROWSER: '1'
      - name: Install docs toolchain (isolated from the engine's pinned tsc)
        working-directory: docs-site
        run: npm ci
      - name: Build docs site (gate)
        # The docs site transcludes real pack source and type-checks its samples
        # with Twoslash; TypeDoc reads js/types.ts + js/engine.ts. A type rename
        # that breaks a sample, or a deleted snippet region, fails HERE — so docs
        # drift blocks the deploy exactly like a golden diff does.
        working-directory: docs-site
        run: npm run build

      # --- Pages artifact (main only) ---
      # Assembled and uploaded HERE, after every gate above has passed, so the
      # deployed bytes ARE the tested bytes. Skipped on PR/branch runs (which
      # stop at the gate) via the shared deploy-condition below.
      - name: Place docs under dist/docs (sibling of the games)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        # The engine build wiped and repopulated dist/ above, so this copy runs
        # after it. The docs deploy at /big-break/docs/ (astro base), sharing the
        # one Pages artifact with the game at the root.
        run: |
          mkdir -p dist/docs
          cp -r docs-site/dist/. dist/docs/
      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload the Pages artifact (the gated dist/)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          # Ship the built site, not the source tree.
          path: dist

  deploy:
    needs: check
    # Deploy only from main — PR/branch runs stop at the check gate. Publishes
    # the single artifact `check` uploaded; it does NOT rebuild or re-upload, so
    # a transient Pages failure is a cheap, safe deploy-only rerun.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages' deploy queue sometimes stalls for minutes platform-side;
          # 600000ms (10 min) is the action's max — wait it out rather than abort.
          timeout: 600000
