name: Generate Love Island portraits

# Manual, on-demand contestant-portrait generation — the "run it for me" path.
# The Gemini key lives ONLY as the repo secret GEMINI_API_KEY (Settings →
# Secrets and variables → Actions); it never touches a machine, a session, or
# the repo. Runs on GitHub's own runners (open network — no agent proxy),
# renders with Nano Banana Pro via tools/gen-li-art.mjs, commits the images back
# to the branch, and uploads a contact sheet to review. Merge to main to deploy.
#
# BUILT TO BE UN-SCARY — spend can only happen on purpose:
#   • DEFAULT is dry_run=true: exercises EVERY step (checkout, build, secret,
#     artifact upload, commit) for $0, generating no images. Run it first and
#     watch it go green before a cent is at stake.
#   • A free preflight verifies the key actually works BEFORE any paid call —
#     a bad/missing key fails here at $0, never mid-render.
#   • Failed API calls are not billed (Gemini charges on successful output only),
#     so a wrong model id / auth error costs nothing.
#   • Rendered images upload as an artifact with `if: always()` — even if a
#     later step breaks, anything you paid for is saved off the runner.
#   • --skip-existing means a re-run or full-cast-after-pilot only pays for the
#     slots still missing, never re-paying for images already on the branch.
#   • DEFAULT mode is BATCH: async, 50% cheaper, and results are RETAINED
#     server-side by Google — so a failure on our side after an image is
#     generated+billed cannot lose it. The batch handle is committed
#     (batch-state.json), so a dead runner resumes the SAME batch, never
#     re-submitting or double-charging.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY RUN — plan only, generate NO images, spend $0 (uncheck to actually render)'
        type: boolean
        default: true
      proof:
        description: 'PROOF loop — render only hero portraits (no moods), do NOT commit, just upload a contact sheet to review. For dialing in art direction cheaply. Pair with tier=draft + only=marco,priya.'
        type: boolean
        default: false
      mode:
        description: 'batch = async, results held server-side, 50% cheaper, crash-proof (recommended). sync = render inline.'
        type: choice
        default: batch
        options: [batch, sync]
      scope:
        description: 'How much to render (when not a dry run)'
        type: choice
        default: pilot
        options: [pilot, full]
      only:
        description: 'Specific contestants (comma list, e.g. marco,priya,amber). Overrides scope.'
        required: false
        default: ''
      reroll:
        description: 'Redo one slot only (e.g. marco_fuming). Overrides scope/only.'
        required: false
        default: ''
      tier:
        description: 'Quality tier'
        type: choice
        default: pro2k
        options: [pro2k, pro4k, draft]
      model:
        description: 'Override the Pro model id (blank = tool default). Use if the preview id changed.'
        required: false
        default: ''

# Commit the rendered images back to the branch.
permissions:
  contents: write

concurrency:
  group: li-portraits-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Generous headroom so a full 112-image run can't be killed mid-batch by the
    # timeout (public repo ⇒ Actions minutes are free, so this costs nothing).
    # Even if it IS interrupted, partial progress is committed below and a re-run
    # resumes for free via --skip-existing.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install pinned toolchain
        run: npm ci
      - name: Build dist/ (tools import the built pack)
        run: npm run build

      - name: Compose the driver flags
        id: flags
        # dry_run wins over everything: no --generate ⇒ the tool only writes the
        # plan + contact sheet ($0). Otherwise reroll > only > scope, and
        # --skip-existing keeps bulk runs from re-paying for existing images.
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            MODE=""
          else
            MODE="--generate"
          fi
          if   [ -n "${{ inputs.reroll }}" ]; then SEL="--reroll=${{ inputs.reroll }}";
          elif [ -n "${{ inputs.only }}"   ]; then SEL="--only=${{ inputs.only }} --skip-existing";
          elif [ "${{ inputs.scope }}" = "full" ]; then SEL="--skip-existing";
          else SEL="--pilot --skip-existing"; fi
          # batch mode: async, results retained server-side, 50% cheaper, resumable.
          if [ "${{ inputs.mode }}" = "batch" ]; then BATCH="--batch"; else BATCH=""; fi
          # proof loop: heroes only, SYNC (immediate), rendered to a committed-but-
          # NOT-wired proofs/ dir. Drop --skip-existing so each iteration overwrites.
          if [ "${{ inputs.proof }}" = "true" ]; then
            PROOF="--proof"; BATCH=""; SEL="${SEL//--skip-existing/}"
          else
            PROOF=""
          fi
          echo "mode=$MODE"   >> "$GITHUB_OUTPUT"
          echo "sel=$SEL"     >> "$GITHUB_OUTPUT"
          echo "batch=$BATCH" >> "$GITHUB_OUTPUT"
          echo "proof=$PROOF" >> "$GITHUB_OUTPUT"

      - name: Preflight — verify the key works (free, generates nothing)
        # Only before a REAL run. Lists models (a free endpoint) to prove the
        # secret authenticates. A bad/missing key fails HERE, at $0, so you never
        # discover a key problem halfway through a paid batch.
        if: inputs.dry_run == false
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is empty/unset. Add it in Settings → Secrets and variables → Actions. Nothing was generated, \$0 spent."
            exit 1
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY")
          if [ "$code" != "200" ]; then
            echo "::error::Key check failed (HTTP $code). Key is wrong or billing isn't enabled. No images generated, \$0 spent."
            exit 1
          fi
          echo "✓ Key authenticates. Proceeding to generation."

      - name: Run the generator (dry = plan only / $0; real = render)
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Blank input leaves the tool default (gemini-3-pro-image-preview).
          GEMINI_IMAGE_MODEL: ${{ inputs.model }}
        run: node tools/gen-li-art.mjs ${{ steps.flags.outputs.mode }} ${{ steps.flags.outputs.batch }} ${{ steps.flags.outputs.proof }} ${{ steps.flags.outputs.sel }} --tier=${{ inputs.tier }}

      # SAFETY NET — runs even if a later step fails. Every image you PAID FOR is
      # written to disk as it renders; this captures them off the ephemeral
      # runner no matter what happens next, so spend is never lost. (In a dry run
      # there are no images and this simply warns — harmless.)
      - name: Upload rendered images (paid output — always saved)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: li-portraits-images
          path: |
            docs/games/love-island/art/final
            docs/games/love-island/art/proofs
          if-no-files-found: warn

      - name: Upload contact sheet + plan (review surface)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: li-portraits-contact-sheet
          path: |
            docs/games/love-island/art/contact-sheet.html
            docs/games/love-island/art/manifest.json
          if-no-files-found: warn

      - name: Wire whatever rendered (idempotent, always runs)
        # Even if generation was interrupted mid-batch, re-scan final/ and wire
        # every image that made it to disk. Guarantees the path map matches the
        # PNGs you actually paid for, so nothing successful is left unreferenced.
        # Skipped in proof mode — a proof is throwaway, it doesn't touch the game.
        if: always() && inputs.proof == false
        run: node tools/gen-li-art.mjs --wire

      - name: Verify the wired portraits still compile
        # The generated portraits.data.ts is just a string→string map, so this
        # can't break from wiring; it's a belt-and-braces check. Even if it fails,
        # the commit below still runs — and the push to main is INDEPENDENTLY
        # re-gated by pages.yml, which blocks any deploy of broken code.
        if: always() && inputs.proof == false
        run: npm run build

      - name: Commit portraits back to the branch (always — persists partial progress)
        # Runs even on failure/timeout so every image you paid for is committed,
        # not just held in the artifact. A re-run then resumes for free
        # (--skip-existing). No-op on a dry run (nothing staged). In PROOF mode
        # this commits only the proofs/ dir — viewable in the repo, but not wired
        # or deployed — so the render can be reviewed without touching the game.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # --ignore-unmatch: stage whichever of these exist and don't error on
          # the ones that don't (proof runs only create proofs/; sync runs have
          # no batch-state.json; etc.). Without it, git add aborts on the first
          # missing pathspec and stages NOTHING.
          git add --ignore-unmatch \
                  docs/games/love-island/art/final \
                  docs/games/love-island/art/proofs \
                  docs/games/love-island/public/art \
                  docs/games/love-island/art/batch-state.json \
                  js/packs/love-island/portraits.data.ts || true
          if git diff --cached --quiet; then
            echo "Nothing to commit (dry run, or no new images)."
          else
            MSG="Generate Love Island contestant portraits (${{ inputs.tier }})"
            [ "${{ inputs.proof }}" = "true" ] && MSG="Add Love Island portrait PROOF render (${{ inputs.tier }}, not wired)"
            git commit -m "$MSG"
            git push origin HEAD:${{ github.ref_name }}
          fi
