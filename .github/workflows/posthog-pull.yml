name: Telemetry pull

# Scheduled pull of playtest telemetry from PostHog (EU). Runs the HogQL
# insights from docs/telemetry.md via tools/posthog-pull.mjs using the
# read-only POSTHOGREADALLTOKEN from the Pages environment, then commits
# telemetry/latest.json + telemetry/summary.md back to main — but only
# when the data actually changed (the script's output is deterministic).
# Pushes made with GITHUB_TOKEN don't trigger other workflows, so this
# never causes a Pages deploy loop.

on:
  schedule:
    - cron: '17 5 * * *' # daily, 05:17 UTC — after a European evening of playtests
  workflow_dispatch:
    inputs:
      env_name:
        description: Environment holding POSTHOGREADALLTOKEN
        default: github-pages
        type: string

permissions:
  contents: write

concurrency:
  group: telemetry-pull

jobs:
  pull:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name || 'github-pages' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # coverage.md diffs observed play against the BUILT content catalogs
      # (dist/) — the pinned toolchain, same as every other consumer.
      - name: Build content catalogs
        run: npm install --no-audit --no-fund && npm run build
      - name: Query PostHog EU
        env:
          POSTHOG_TOKEN: ${{ secrets.POSTHOGREADALLTOKEN || vars.POSTHOGREADALLTOKEN }}
        run: node tools/posthog-pull.mjs
      - name: Commit refreshed telemetry
        run: |
          git add telemetry
          if git diff --cached --quiet; then
            echo "Telemetry unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "telemetry: refresh PostHog pull ($(date -u +%F))"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
