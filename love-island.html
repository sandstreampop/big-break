<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Served at /love-island/ (tools/build.mjs copies this to
       dist/love-island/index.html), so shared assets resolve with ../ -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="THE VILLA">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="../assets/villa-icon-180.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1016">
  <title>THE VILLA — a Big Break game</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💘%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/love-island.css">
</head>
<body>
  <div id="app">
    <section id="screen-title" class="screen active"></section>
    <section id="screen-setup" class="screen"></section>
    <section id="screen-crossroads" class="screen"></section>
    <section id="screen-ending" class="screen"></section>
    <section id="screen-wall" class="screen"></section>
    <section id="screen-trophies" class="screen"></section>
    <section id="screen-roster" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
    <section id="screen-game" class="screen">
      <div id="hud"></div>
      <div id="stage"></div>
      <div id="card-area"></div>
      <div id="encore-bar"></div>
      <div id="choice-buttons"></div>
    </section>
    <div id="overlay"></div>
  </div>
  <script type="module" src="../js/main-love-island.js"></script>
</body>
</html>
